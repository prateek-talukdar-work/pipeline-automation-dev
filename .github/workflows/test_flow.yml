name: Hello on merge to main

on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  post-merge-step:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Say hello
        run: echo "Hello there"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current branch
        id: current-branch
        run: echo "current-branch=$(git branch --show-current)" >> $GITHUB_OUTPUT

      - name: Switch to main (if needed)
        if: steps.current-branch.outputs.current-branch != 'main'
        run: |
          git checkout main
          git pull origin main

      - name: Check if develop2 branch exists
        id: check-branch
        uses: GuillaumeFalourd/branch-exists@v1.1
        with:
          branch: develop2

      - name: Create develop2 branch if missing
        if: steps.check-branch.outputs.exists == 'false'
        run: |
          git branch develop2
          git push origin develop2
          echo "✅ Created develop2 branch from main"

      - name: Test merge conflicts (with debug)
        id: pr-check
        run: |
          echo "Starting conflict test..."
          git fetch origin develop2 || echo "Fetch failed"
          
          # Test merge and capture exit code explicitly
          if git merge origin/develop2 --no-commit --no-ff; then
            echo "no-conflicts=true" >> $GITHUB_OUTPUT
            echo "✅ No conflicts detected"
            git merge --abort || true
          else
            echo "no-conflicts=false" >> $GITHUB_OUTPUT
            echo "❌ Conflicts detected"
            git merge --abort || true
          fi
          
          # Debug: print the output file
          cat $GITHUB_OUTPUT || echo "No output file"

      - name: Debug output values
        run: |
          echo "no-conflicts value: ${{ steps.pr-check.outputs.no-conflicts }}"

      - name: Create PR from main → develop2 (always)
        id: pull-request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "chore: sync main into develop2"
          body: "Automated sync from main → develop2"
          base: develop2
          branch: "auto-sync-main-${{ github.run_id }}"
          delete-branch: false

      - name: Auto-merge PR if no conflicts
        if: steps.pr-check.outputs.no-conflicts == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Auto-merging PR..."
          gh pr merge "${{ steps.pull-request.outputs.pull-request-url }}" --auto --merge
        continue-on-error: true

      - name: Skip merge if conflicts (debug)
        if: steps.pr-check.outputs.no-conflicts != 'true'
        run: echo "PR created but not merged due to conflicts"
