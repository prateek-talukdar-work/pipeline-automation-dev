name: Hello on merge to main

on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  post-merge-step:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Say hello
        run: echo "Hello there"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current branch
        id: current-branch
        run: echo "current-branch=$(git branch --show-current)" >> $GITHUB_OUTPUT

      - name: Switch to main (if needed)
        if: steps.current-branch.outputs.current-branch != 'main'
        run: |
          git checkout main
          git pull origin main

      - name: Check if develop2 branch exists
        id: check-branch
        uses: GuillaumeFalourd/branch-exists@v1.1
        with:
          branch: develop2

      - name: Create develop2 branch if missing
        if: steps.check-branch.outputs.exists == 'false'
        run: |
          git branch develop2
          git push origin develop2
          echo "✅ Created develop2 branch from main"

      
           - name: Test merge conflicts & create PR or merge
        id: pr-check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin develop2
          
          if git merge origin/develop2 --no-commit --no-ff 2>/dev/null; then
            echo "no-conflicts=true" >> $GITHUB_OUTPUT
            git merge --abort || true
          else
            echo "no-conflicts=false" >> $GITHUB_OUTPUT
            git merge --abort || true
          fi

      - name: Create PR if conflicts
        if: steps.pr-check.outputs.no-conflicts != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "❌ Merge conflicts: master → develop2"
          body: "Automated sync detected merge conflicts.\n\nPlease resolve conflicts and merge manually."
          base: develop2
          branch: "auto-sync-master-${{ github.run_id }}"
          delete-branch: true

      - name: Auto-merge if no conflicts
        if: steps.pr-check.outputs.no-conflicts == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "chore: sync master into develop2" \
            --body "Automated sync from master → develop2\n\n✅ No conflicts - auto-merging..." \
            --base develop2 \
            --head "auto-sync-master-${{ github.run_id }}"
          
          gh pr merge "auto-sync-master-${{ github.run_id }}" --auto --merge

