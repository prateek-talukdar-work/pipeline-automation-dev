      - name: Auto-merge PR if no conflicts
        if: steps.pr-check.outputs.no-conflicts == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Auto-merging..."
          gh pr merge "${{ steps.pull-request.outputs.pull-request-url }}" --auto --merge
        continue-on-error: true  # ← FIXED: Same level as 'run', not under it

      - name: Skip auto-merge if conflicts
        if: steps.pr-check.outputs.no-conflicts != 'true'
        run: echo "PR created - manual merge required due to conflicts"
